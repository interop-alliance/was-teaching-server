name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      # Provision pnpm via Corepack (bundled with Node) from the
      # `packageManager` pin in package.json, avoiding the flaky
      # pnpm/action-setup self-installer.
      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Test (Node) with coverage
        run: pnpm run test:coverage

      # Surface the v8/lcov coverage report (reporters configured in
      # vite.config.ts) as a downloadable build artifact.
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: error

  conformance:
    runs-on: ubuntu-latest
    # The CLI target URL must stay byte-identical to SERVER_URL (ZCap
    # invocation targets embed host:port), so both come from one place.
    env:
      PORT: '3002'
      SERVER_URL: http://localhost:3002
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      # Provision pnpm via Corepack (bundled with Node) from the
      # `packageManager` pin in package.json, avoiding the flaky
      # pnpm/action-setup self-installer.
      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      # Run the `was-conformance` CLI (from @interop/was-conformance-suite)
      # twice against the production build: once with open provisioning, once
      # with an onboarding token required server-side and supplied client-side.
      # The CLI exit code gates the job (0 = conformant, 1 = failures,
      # 2 = usage error / server unreachable); the JSON reports are uploaded as
      # build artifacts.
      - name: Conformance (open provisioning)
        shell: bash
        run: |
          node dist/start.js > server-open.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT
          for _ in $(seq 1 60); do
            curl -fsS "$SERVER_URL/health" > /dev/null 2>&1 && break
            sleep 0.5
          done
          pnpm exec was-conformance "$SERVER_URL" \
            --reporter json > conformance-open.json

      - name: Conformance (onboarding token)
        shell: bash
        env:
          WAS_ONBOARDING_TOKEN: ci-conformance-token
        run: |
          node dist/start.js > server-token.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT
          for _ in $(seq 1 60); do
            curl -fsS "$SERVER_URL/health" > /dev/null 2>&1 && break
            sleep 0.5
          done
          pnpm exec was-conformance "$SERVER_URL" \
            --token "$WAS_ONBOARDING_TOKEN" \
            --reporter json > conformance-token.json

      - name: Upload conformance reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-reports
          path: |
            conformance-open.json
            conformance-token.json
            server-open.log
            server-token.log
          if-no-files-found: warn
