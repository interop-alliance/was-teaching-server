name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      # Provision pnpm via Corepack (bundled with Node) from the
      # `packageManager` pin in package.json, avoiding the flaky
      # pnpm/action-setup self-installer.
      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Test (Node)
        run: pnpm run test-node

  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      # Provision pnpm via Corepack (bundled with Node) from the
      # `packageManager` pin in package.json, avoiding the flaky
      # pnpm/action-setup self-installer.
      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Spawns the server as a subprocess, waits for it to answer, runs the
      # standalone conformance suite against it, then tears it down. PORT is
      # passed explicitly so the run does not depend on the script's default.
      - name: Conformance (server spawned in-process)
        run: pnpm conformance:local
        env:
          PORT: '3002'
